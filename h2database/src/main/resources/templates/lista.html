<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Gamers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-edit:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f8f9ff;
            transition: background 0.3s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .count-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .actions-cell {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>👥 Sistema de Cadastro</h1>
        <p class="subtitle">Gerenciamento de Gamers</p>
    </header>

    <div class="actions">
        <div>
            <h2 style="color: #333; display: inline-block; margin-right: 15px;">
                Lista de usuários
            </h2>
            <span class="count-badge" th:text="${usuarios.size()} + ' cadastrado(s)'"></span>
        </div>
        <a th:href="@{/novo}" class="btn btn-primary">➕ Adicionar Usuário</a>
    </div>

    <!-- Verifica se há pessoas cadastradas -->
    <div th:if="${usuarios != null and !usuarios.empty}">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nickname</th>
                <th>Email</th>
                <th>Jogo Favorito</th>
                <th>Nível</th>
                <th style="text-align: center;">Ações</th>
            </tr>
            </thead>
            <tbody>
            <!-- Loop para cada pessoa -->
            <tr th:each="usuarios : ${usuario}">
                <td th:text="${usuario.id}" style="font-weight: 600; color: #667eea;">1</td>
                <td th:text="${usuario.nickname}" style="font-weight: 600;">JotaP</td>
                <td th:text="${usuario.email}">jotinha@email.com</td>
                <td th:text="${usuario.jogoFavorito}">GTA V</td>
                <td th:text="' nível' + ${usuario.nivel}">100</td>
                <td>
                    <div class="actions-cell" style="justify-content: center;">
                        <a th:href="@{/editar/{id}(id=${usuario.id})}" class="btn btn-edit">
                            ✏️ Editar
                        </a>
                        <a th:href="@{/remover/{id}(id=${usuario.id})}"
                           class="btn btn-delete"
                           onclick="return confirm('Tem certeza que deseja remover este usuario?')">
                            🗑️ Remover
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Mensagem quando não há pessoas -->
    <div th:if="${usuarios == null or usuarios.empty}" class="empty-state">
        <svg fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <h2>Nenhum usuario cadastrado ainda</h2>
        <p>Clique em "Adicionar Usuário" para cadastrar a primeira!</p>
    </div>
</div>
</body>
</html>
